name: flutter_litert_lm
description: >-
  Flutter plugin for Google's LiteRT-LM — run Large Language Models on-device
  with CPU, GPU (OpenCL) or NPU acceleration. Supports Gemma, Qwen, Phi,
  DeepSeek and more.
version: 0.3.0
homepage: https://github.com/songhieu/flutter_litert_lm
repository: https://github.com/songhieu/flutter_litert_lm
issue_tracker: https://github.com/songhieu/flutter_litert_lm/issues
documentation: https://github.com/songhieu/flutter_litert_lm#readme

topics:
  - llm
  - on-device
  - litert
  - gemma
  - ai

environment:
  sdk: ^3.4.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.songhieu.flutter_litert_lm
        pluginClass: FlutterLitertLmPlugin
      ios:
        pluginClass: FlutterLitertLmPlugin
